name: Build Style Guide

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-latex-recommended \
            latexmk \
            inkscape

      - name: Build logo PDFs from SVG
        run: make logos

      - name: Build style-guide
        run: make build-verbose PRESENTATION=style

      - name: Verify PDF was created
        run: test -f style-guide/style-guide.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: style-guide-pdf
          path: style-guide/style-guide.pdf
